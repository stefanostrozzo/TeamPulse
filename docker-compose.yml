services:
  app:
    image: ${APP_IMAGE:-ghcr.io/stefanostrozzo/teampulse:latest}
    restart: unless-stopped
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - storage:/var/www/html/storage
    networks: [teampulse]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on: [app, reverb]
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks: [teampulse]

  queue:
    image: ${APP_IMAGE:-ghcr.io/stefanostrozzo/teampulse:latest}
    restart: unless-stopped
    env_file: .env
    command: php artisan queue:work --tries=1 --sleep=3 --max-time=3600
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - storage:/var/www/html/storage
    networks: [teampulse]

  reverb:
    image: ${APP_IMAGE:-ghcr.io/stefanostrozzo/teampulse:latest}
    restart: unless-stopped
    env_file: .env
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    depends_on:
      mysql:
        condition: service_healthy
    networks: [teampulse]

  scheduler:
    image: ${APP_IMAGE:-ghcr.io/stefanostrozzo/teampulse:latest}
    restart: unless-stopped
    env_file: .env
    command: sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - storage:/var/www/html/storage
    networks: [teampulse]

  mysql:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [teampulse]

volumes:
  dbdata:
  storage:

networks:
  teampulse:
