services:
  app:
    build:
      context: .
      target: app
      args:
        VITE_APP_NAME: TeamPulse
        VITE_REVERB_APP_KEY: ${VITE_REVERB_APP_KEY:-tashhaz4mvni2ddhl0pi}
        VITE_REVERB_HOST: ${VITE_REVERB_HOST:-localhost}
        VITE_REVERB_PORT: ${VITE_REVERB_PORT:-80}
        VITE_REVERB_SCHEME: ${VITE_REVERB_SCHEME:-http}
    image: ${APP_IMAGE:-teampulse:local}
    restart: unless-stopped
    env_file: .env.docker.local
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - storage:/var/www/html/storage
    networks: [teampulse]

  nginx:
    build:
      context: .
      target: nginx-server
      args:
        VITE_APP_NAME: TeamPulse
        VITE_REVERB_APP_KEY: ${VITE_REVERB_APP_KEY:-tashhaz4mvni2ddhl0pi}
        VITE_REVERB_HOST: ${VITE_REVERB_HOST:-localhost}
        VITE_REVERB_PORT: ${VITE_REVERB_PORT:-80}
        VITE_REVERB_SCHEME: ${VITE_REVERB_SCHEME:-http}
    image: ${NGINX_IMAGE:-teampulse-nginx:local}
    restart: unless-stopped
    depends_on: [app, reverb]
    ports:
      - "80:80"
    networks: [teampulse]

  queue:
    image: ${APP_IMAGE:-teampulse:local}
    restart: unless-stopped
    env_file: .env.docker.local
    command: php artisan queue:work --tries=1 --sleep=3 --max-time=3600
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - storage:/var/www/html/storage
    networks: [teampulse]

  reverb:
    image: ${APP_IMAGE:-teampulse:local}
    restart: unless-stopped
    env_file: .env.docker.local
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    depends_on:
      mysql:
        condition: service_healthy
    networks: [teampulse]

  scheduler:
    image: ${APP_IMAGE:-teampulse:local}
    restart: unless-stopped
    env_file: .env.docker.local
    command: sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - storage:/var/www/html/storage
    networks: [teampulse]

  mysql:
    image: mysql:8
    restart: unless-stopped
    env_file: .env.docker.local
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [teampulse]

volumes:
  dbdata:
  storage:

networks:
  teampulse:
